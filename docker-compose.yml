services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mbm_quarry
      POSTGRES_USER: mbm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://mbm:${DB_PASSWORD}@db:5432/mbm_quarry
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:4000}
    ports:
      - "${APP_PORT:-4000}:3000"
    depends_on:
      - db

volumes:
  pgdata:
